<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Chooser</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            animation: gradient 5s ease infinite;
            overflow: hidden;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            font-size: 3em;
            color: white;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .tag {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 10px 20px;
            margin: 10px;
            font-size: 1.2em;
            color: #333;
            transition: transform 0.3s;
        }
        .tag:hover {
            transform: scale(1.1);
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.5em;
            color: white;
            background: #ff6b6b;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #ff3b3b;
            animation: pulse 0.5s infinite;
        }
        .confetti {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Restaurant Chooser</h1>
    <div class="tags">
        <div class="tag">Italian</div>
        <div class="tag">Mexican</div>
        <div class="tag">Thai</div>
        <div class="tag">Chinese</div>
        <div class="tag">Indian</div>
    </div>
    <button onclick="chooseRestaurant()">Choose a Restaurant!</button>
    <div class="confetti"></div>

    <script>
        function chooseRestaurant() {
            const tags = document.querySelectorAll('.tag');
            const randomIndex = Math.floor(Math.random() * tags.length);
            const selected = tags[randomIndex].innerText;
            alert(`You should go to a ${selected} restaurant!`);
            showConfetti();
        }

        function showConfetti() {
            const confetti = document.querySelector('.confetti');
            confetti.style.display = 'block';
            // You can add confetti animation code here
        }
    </script>
</body>
</html>
